<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>pacman</title>
        <link rel="icon" href="./static/assets/favicon.ico">
        <link rel="stylesheet" href="static/css/global.css">
        <link rel="stylesheet" href="static/css/styles.css">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    </head>

    <body>
        <div class="game-container">
            <div class="subject">
                <div class="subject-header">
                    <div class="title-game"><img src="static/assets/pm-header.png" alt="Pacman"></div>
                </div>
                
                <div class="subject-body">
                    <div class="game-board" id="game-board"></div>
                    
                    <div class="mobile-controls">
                        <div class="control-row">
                            <button class="control-btn" id="btn-up"><i class='bx bxs-up-arrow'></i></button>
                        </div>
                        <div class="control-row">
                            <button class="control-btn" id="btn-left"><i class='bx bxs-left-arrow'></i></button>
                            <button class="control-btn" id="btn-pause"><i class='bx bx-pause'></i></button>
                            <button class="control-btn" id="btn-right"><i class='bx bxs-right-arrow'></i></button>
                        </div>
                        <div class="control-row">
                            <button class="control-btn" id="btn-down"><i class='bx bxs-down-arrow'></i></button>
                        </div>
                    </div>
                </div>
    
                <div class="subject-footer">
                    <button id="reset" style="display:none;"></button>
                    <button id="continue" style="display:none;"></button>
                </div>
            </div>
        </div>

        <script type="module" src="static/js/main.js"></script>
    </body>
</html>
